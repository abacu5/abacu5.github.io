<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="wrap">
    <header class="banner">
      <div class="prompt">cat mission_statement.txt</div>
      <h1>{{ site.title }}<span class="cursor" aria-hidden="true"></span></h1>
      <p class="tagline">{{ site.description }}</p>
      <nav class="top">
        <a href="{{ '/' | relative_url }}">writeups</a>
        <a href="https://github.com/abacu5" target="_blank" rel="noopener">github</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      &copy; {{ 'now' | date: "%Y" }} Abacus. Built with Jekyll on GitHub Pages.
    </footer>
  </div>
</body>
</html>
